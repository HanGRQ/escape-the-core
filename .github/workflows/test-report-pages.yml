name: Test report (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "backend/app/**"
      - "backend/knowledge_base/chunks.json"
      - "backend/requirements.txt"
      - "backend/scripts/**"
      - "backend/tests/**"
      - ".github/workflows/test-report-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  test-and-build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-huggingface-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Build knowledge base
        working-directory: backend
        run: python scripts/build_knowledge_base.py

      - name: Run pytest suite
        working-directory: backend
        run: python -m pytest tests -v

      - name: Run DDA report suite
        working-directory: backend
        run: python scripts/test_dda.py

      - name: Run RAG report suite
        working-directory: backend
        run: python scripts/test_rag.py

      - name: Generate combined HTML report
        working-directory: backend
        run: python scripts/generate_report.py

      - name: Stage GitHub Pages site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/results
          latest_report="$(find backend/test_reports -maxdepth 1 -name 'report_*.html' -type f -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          test -n "$latest_report"
          cp "$latest_report" _site/index.html
          find backend/test_reports -maxdepth 1 -name '*.json' -type f -exec cp {} _site/results/ \;
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test-and-build-report
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
